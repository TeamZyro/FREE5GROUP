<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Creator - Free Fire Stats Web</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBase: '#0b0f19',
                        darkCard: 'rgba(21, 28, 44, 0.7)',
                        primary: '#3b82f6',
                        accent: '#8b5cf6',
                        success: '#10b981',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b0f19;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            background-attachment: fixed;
            color: #e2e8f0;
        }

        .glass-card {
            background: rgba(21, 28, 44, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
        }

        .btn-glow {
            position: relative;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }

        .account-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .account-card:hover {
            border-color: rgba(139, 92, 246, 0.4);
            background: rgba(139, 92, 246, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="min-h-screen text-gray-200 antialiased">

    <div class="max-w-4xl mx-auto px-4 py-12 flex flex-col gap-8">
        
        <!-- Header -->
        <header class="flex items-center justify-between glass-card p-6">
            <div class="flex items-center gap-4">
                <a href="/" class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all border border-white/10">
                    <i class="ph ph-arrow-left text-xl text-gray-300"></i>
                </a>
                <div>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                        Group Creator</h1>
                    <p class="text-xs text-gray-400">Create 5-player Guest Account Groups</p>
                </div>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-accent/10 border border-accent/20 text-accent text-xs font-bold uppercase tracking-wider">
                <i class="ph ph-users-three"></i>
                Guest Mode
            </div>
        </header>

        <!-- Control Panel -->
        <section class="glass-card p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Name Prefix</label>
                    <input type="text" id="namePrefix" value="BlackApis" 
                        class="bg-darkBase border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-sm outline-none transition-all">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Password Prefix</label>
                    <input type="text" id="pwdPrefix" value="FF" 
                        class="bg-darkBase border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-sm outline-none transition-all">
                </div>
                <div class="flex flex-col gap-2 justify-end">
                    <button onclick="generateGroup()" id="genBtn"
                        class="bg-gradient-to-r from-primary to-accent hover:opacity-90 text-white px-6 py-3 rounded-lg font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20 btn-glow">
                        <i class="ph ph-sparkle"></i>
                        Generate Group (5 Players)
                    </button>
                </div>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loading" class="hidden glass-card p-12 flex flex-col items-center justify-center gap-4">
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 border-4 border-primary/20 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-primary rounded-full animate-spin"></div>
            </div>
            <p class="text-gray-400 font-medium">Generating guest accounts... This may take a minute.</p>
        </div>

        <!-- Accounts Grid -->
        <div id="accountsGrid" class="hidden flex flex-col gap-4">
            <!-- Accounts will be injected here -->
        </div>

        <!-- Actions -->
        <div id="actionArea" class="hidden flex flex-col items-center gap-4">
            <div class="flex justify-center gap-4">
                <button onclick="saveAllAccounts()"
                    class="bg-success/20 hover:bg-success/30 text-success border border-success/30 px-8 py-4 rounded-xl font-bold transition-all flex items-center gap-2">
                    <i class="ph ph-floppy-disk"></i>
                    Save to Database
                </button>
                <button onclick="startGroupBots()" id="startGroupBtn"
                    class="bg-primary hover:bg-primary/80 text-white px-8 py-4 rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg shadow-primary/20">
                    <i class="ph ph-play-circle"></i>
                    Start All 5 Bots
                </button>
            </div>
            <button onclick="location.reload()"
                class="text-gray-500 hover:text-gray-300 text-sm font-medium transition-all">
                Clear & Reset Everything
            </button>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="glass-card px-6 py-4 flex items-center gap-3 border-l-4 border-l-primary">
            <i id="toastIcon" class="ph ph-info text-xl text-primary"></i>
            <div>
                <h4 id="toastTitle" class="text-sm font-semibold text-white">Notification</h4>
                <p id="toastMessage" class="text-xs text-gray-400">Message details here.</p>
            </div>
        </div>
    </div>

    <script>
        let generatedAccounts = [];

        function showToast(title, message, type = 'info') {
            const toastEl = document.getElementById('toast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastMessage').textContent = message;

            toastEl.firstElementChild.className = `glass-card px-6 py-4 flex items-center gap-3 border-l-4 ${type === 'error' ? 'border-l-danger' : type === 'success' ? 'border-l-success' : 'border-l-primary'}`;
            document.getElementById('toastIcon').className = `ph ${type === 'error' ? 'ph-warning-circle text-danger' : type === 'success' ? 'ph-check-circle text-success' : 'ph-info text-primary'} text-xl`;

            toastEl.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toastEl.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        async function generateGroup() {
            const name = document.getElementById('namePrefix').value;
            const pwd = document.getElementById('pwdPrefix').value;
            const btn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const grid = document.getElementById('accountsGrid');
            const actions = document.getElementById('actionArea');

            btn.disabled = true;
            loading.classList.remove('hidden');
            grid.classList.add('hidden');
            actions.classList.add('hidden');
            grid.innerHTML = '';

            try {
                const res = await fetch('/api/generate_group', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: 5, name: name, password_prefix: pwd })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    generatedAccounts = data.accounts;
                    renderAccounts();
                    grid.classList.remove('hidden');
                    actions.classList.remove('hidden');
                    showToast('Success', 'Created 5 player group successfully!', 'success');
                } else {
                    showToast('Error', data.message || 'Failed to generate accounts', 'error');
                }
            } catch (err) {
                showToast('Error', 'Server communication failed', 'error');
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function renderAccounts() {
            const grid = document.getElementById('accountsGrid');
            generatedAccounts.forEach((acc, index) => {
                const el = document.createElement('div');
                el.className = 'glass-card p-5 flex items-center justify-between border-l-4 border-l-accent account-card animate-fade-in';
                el.style.animationDelay = `${index * 0.1}s`;
                el.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div class="w-12 h-12 rounded-xl bg-accent/20 flex items-center justify-center text-accent font-bold">
                            #${index + 1}
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-white">${acc.name}</h3>
                            <div class="flex gap-4 mt-1">
                                <span class="text-xs text-gray-500">UID: <span class="text-primary font-mono select-all">${acc.uid}</span></span>
                                <span class="text-xs text-gray-500">PASS: <span class="text-success font-mono select-all">${acc.password}</span></span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="copyToClipboard('${acc.uid}:${acc.password}')" class="p-2 rounded-lg bg-white/5 hover:bg-white/10 text-gray-400 hover:text-white transition-all border border-white/5" title="Copy Credentials">
                            <i class="ph ph-copy"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(el);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showToast('Copied', 'Account credentials copied to clipboard');
        }

        async function saveAllAccounts() {
            if (generatedAccounts.length === 0) return;

            try {
                const res = await fetch('/api/save_group', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accounts: generatedAccounts })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    showToast('Saved', data.message, 'success');
                    return true;
                } else {
                    showToast('Error', data.message, 'error');
                    return false;
                }
            } catch (err) {
                showToast('Error', 'Failed to save to database', 'error');
                return false;
            }
        }

        async function startGroupBots() {
            if (generatedAccounts.length === 0) return;
            
            const btn = document.getElementById('startGroupBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-circle-notch animate-spin"></i> Starting...';
            
            try {
                const saved = await saveAllAccounts();
                if (!saved) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="ph ph-play-circle"></i> Start All 5 Bots';
                    return;
                }
                
                const uids = generatedAccounts.map(a => a.uid);
                const res = await fetch('/api/start_specific_bots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uids: uids })
                });
                
                const data = await res.json();
                if (data.status === 'success') {
                    showToast('Started', data.message, 'success');
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    showToast('Error', data.message, 'error');
                }
            } catch (err) {
                showToast('Error', 'Failed to start bots', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ph ph-play-circle"></i> Start All 5 Bots';
            }
        }
    </script>
</body>

</html>
